<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Listical — Data Flow Visualiser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  #topbar {
    height: 52px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; color: #e6edf3; letter-spacing: 0.3px; }
  .toggle-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .toggle-btn.active {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
  }
  .toggle-btn:hover:not(.active) { background: #30363d; color: #e6edf3; }

  /* ─── LEGEND ─── */
  #legend {
    display: flex;
    gap: 20px;
    margin-left: auto;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #8b949e;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-line {
    width: 24px; height: 2px;
    flex-shrink: 0;
  }

  /* ─── MAIN CANVAS AREA ─── */
  #canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #canvas-wrap svg {
    width: 100%;
    height: 100%;
    cursor: grab;
    user-select: none;
  }
  #canvas-wrap svg.panning { cursor: grabbing; }

  /* ─── TOOLTIP ─── */
  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    line-height: 1.5;
    color: #c9d1d9;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip strong { color: #e6edf3; display: block; margin-bottom: 4px; }

  /* ─── HINT ─── */
  #hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #161b22cc;
    border: 1px solid #30363d;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 11px;
    color: #484f58;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Codex Listical · Data Flow</h1>
  <button class="toggle-btn active" id="btn-exists" onclick="setView('exists')">What exists</button>
  <button class="toggle-btn" id="btn-gaps" onclick="setView('gaps')">Gaps / missing connections</button>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1f6feb"></div>Pages</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ea043"></div>localStorage</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6e40c9"></div>Supabase</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b08800"></div>Auth / Session</div>
    <div class="legend-item"><div class="legend-dot" style="background:#da3633"></div>Context Providers</div>
    <div class="legend-line" style="background:#58a6ff"></div><span style="font-size:11px;color:#8b949e">read</span>
    <div class="legend-line" style="background:#2ea043"></div><span style="font-size:11px;color:#8b949e">write</span>
    <div class="legend-line" style="background:#f78166"></div><span style="font-size:11px;color:#8b949e">event</span>
    <div class="legend-line" style="background:#da3633;border-top:2px dashed #da3633;height:0"></div><span style="font-size:11px;color:#8b949e">gap</span>
  </div>
</div>

<div id="canvas-wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="hint">Click a node to highlight its connections · Scroll to zoom · Drag to pan</div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════

const NODES = [
  // ── Pages ──────────────────────────────────────────────────
  { id: 'goal',    label: 'Goal Page',    sub: '/staging · StagingPageV2',    type: 'page',    x: 400,  y: 200,
    desc: 'Manages project shortlist & plan tables (Reasons/Outcomes/Actions/Subprojects/Schedule). Projects can be "added to plan" which flags them for Tactics.' },
  { id: 'plan',    label: 'Plan Page',    sub: '/tactics · TacticsPage',      type: 'page',    x: 900,  y: 200,
    desc: 'Visual time-block scheduler. Reads Goal\'s shortlist for draggable project chips. Saves daily bounds & weekly quotas that feed into System.' },
  { id: 'system',  label: 'System Page',  sub: '/ · ProjectTimePlannerV2',    type: 'page',    x: 650,  y: 650,
    desc: 'Spreadsheet for task planning over a 12-week timeline. Reads projects from Goal, reads daily bounds from Plan. NOTE: useVirtualizer is imported but never called — all rows render unconditionally.' },

  // ── Context Providers ───────────────────────────────────────
  { id: 'auth_ctx',  label: 'AuthContext',   sub: 'session · isAuthenticated',  type: 'context', x: 120,  y: 80,
    desc: 'Manages Supabase auth session. Sets currentUserId in storageService to scope all localStorage keys. Exposed via useAuth().' },
  { id: 'user_ctx',  label: 'UserContext',   sub: 'profile · preferences',      type: 'context', x: 120,  y: 200,
    desc: 'Loads user profile from Supabase profiles table. Preferences are NEVER persisted (stub updatePreferences).' },
  { id: 'year_ctx',  label: 'YearContext',   sub: 'currentYear · metadata',     type: 'context', x: 120,  y: 340,
    desc: 'Current 12-week cycle number. Scopes all data keys. Provided by Layout component wrapping all protected routes.' },

  // ── Auth / Session ──────────────────────────────────────────
  { id: 'supabase_auth', label: 'Supabase Auth',  sub: 'auth.users · sessions',   type: 'auth',    x: 120,  y: -60,
    desc: 'Supabase authentication. Handles login, signup, OTP, password reset. Session persisted by Supabase client library.' },

  // ── Supabase tables ─────────────────────────────────────────
  { id: 'db_profiles',    label: 'profiles',         sub: 'Supabase table',          type: 'supabase', x: 350,  y: -80,
    desc: 'Stores: id, email, full_name, avatar_url, date_of_birth, deletion_requested_at, deleted_at. Read by UserContext & ProtectedRoute.' },
  { id: 'db_deletion',    label: 'deletion_audit_log', sub: 'Supabase table',         type: 'supabase', x: 600,  y: -80,
    desc: 'GDPR audit log. Written when account deletion is requested/completed. Hashed user IDs for privacy.' },

  // ── localStorage stores ─────────────────────────────────────
  { id: 'ls_staging',     label: 'staging-year-N-shortlist', sub: 'localStorage',  type: 'storage',  x: 200,  y: 460,
    desc: 'All Goal page data: shortlist items, planTableEntries (all plan table rows), project colours, addedToPlan flags, planSummary. Year-scoped. Written by Goal, read by Goal + Plan + System.' },
  { id: 'ls_tactics_metrics', label: 'tactics-year-N-metrics-state', sub: 'localStorage', type: 'storage', x: 750, y: 460,
    desc: 'dailyBounds (min/max hours per weekday) and projectWeeklyQuotas. Written by Plan page, read by System page. Bridge between Plan and System.' },
  { id: 'ls_tactics_chips', label: 'tactics-year-N-chips-state', sub: 'localStorage', type: 'storage',  x: 1050, y: 460,
    desc: 'Project chips positions, sleep blocks, custom projects. Written and read only by Plan page. NOT accessible to other pages.' },
  { id: 'ls_tactics_settings', label: 'tactics-page-settings', sub: 'localStorage', type: 'storage',  x: 1200, y: 300,
    desc: 'Start hour/minute, increment, 24-hour mode, start day. Written and read only by Plan page.' },
  { id: 'ls_tactics_colwidths', label: 'tactics-column-widths-N', sub: 'localStorage', type: 'storage', x: 1200, y: 460,
    desc: 'Column widths for Plan page grid. Written directly (not via tacticsMetricsStorage). Plan-only.' },
  { id: 'ls_planner',     label: 'planner-year-N-project-1-*', sub: 'localStorage', type: 'storage',  x: 650,  y: 870,
    desc: 'All System page data: task rows (the spreadsheet content), column sizing, start date, show/hide settings, sort statuses, totalDays, visible day columns. Year + projectId scoped.' },
  { id: 'ls_year_meta',   label: 'app-year-metadata',          sub: 'localStorage', type: 'storage',  x: 120,  y: 500,
    desc: 'Year cycle metadata: currentYear number, all years with status (active/archived), startDate, endDate, totalWeeksCompleted, totalHoursCompleted.' },
];

const EDGES_EXISTS = [
  // Auth flow
  { from: 'supabase_auth', to: 'auth_ctx',   label: 'session/events', type: 'read',  curve: -30 },
  { from: 'auth_ctx',      to: 'supabase_auth', label: 'signIn/signOut/OTP', type: 'write', curve: 30 },
  { from: 'auth_ctx',      to: 'user_ctx',   label: 'authUser, isAuthenticated', type: 'read', curve: 0 },
  { from: 'user_ctx',      to: 'db_profiles', label: 'SELECT * (on auth)', type: 'read',  curve: -20 },
  { from: 'user_ctx',      to: 'db_profiles', label: 'INSERT (if missing)', type: 'write', curve: 20 },
  { from: 'user_ctx',      to: 'db_profiles', label: 'UPDATE profile', type: 'write', curve: 50 },
  { from: 'auth_ctx',      to: 'year_ctx',   label: 'userId (via storageService scoping)', type: 'event', curve: 0 },

  // ProtectedRoute touches profiles
  { from: 'system',        to: 'db_profiles', label: 'SELECT deletion_requested_at (ProtectedRoute)', type: 'read', curve: 30 },

  // YearContext ↔ year metadata
  { from: 'year_ctx',      to: 'ls_year_meta', label: 'read/write year metadata', type: 'read',  curve: -20 },
  { from: 'ls_year_meta',  to: 'year_ctx',     label: 'yearMetadataStorage event', type: 'event', curve: 20 },

  // Year context → pages
  { from: 'year_ctx',      to: 'goal',    label: 'currentYear (scope key)', type: 'read', curve: 20 },
  { from: 'year_ctx',      to: 'plan',    label: 'currentYear (scope key)', type: 'read', curve: 0 },
  { from: 'year_ctx',      to: 'system',  label: 'currentYear (scope key)', type: 'read', curve: -20 },

  // Goal ↔ staging storage
  { from: 'goal',          to: 'ls_staging',   label: 'saveStagingState (on every change)', type: 'write', curve: -30 },
  { from: 'ls_staging',    to: 'goal',         label: 'loadStagingState (on mount)', type: 'read', curve: 30 },

  // Plan reads staging (for chips)
  { from: 'ls_staging',    to: 'plan',         label: 'loadStagingState → project chips\n(addedToPlan=true only)', type: 'read', curve: 0 },
  { from: 'ls_staging',    to: 'plan',         label: 'staging-state-update event', type: 'event', curve: 40 },

  // System reads staging (for project dropdowns)
  { from: 'ls_staging',    to: 'system',       label: 'useProjectsData → project/subproject names\nfor dropdowns', type: 'read', curve: 40 },
  { from: 'ls_staging',    to: 'system',       label: 'staging-state-update event (reactive refresh)', type: 'event', curve: -40 },

  // Plan → tactics metrics → System
  { from: 'plan',          to: 'ls_tactics_metrics', label: 'saveTacticsMetrics (daily bounds, quotas)', type: 'write', curve: -30 },
  { from: 'ls_tactics_metrics', to: 'system', label: 'useTacticsMetrics → dailyBounds, projectWeeklyQuotas', type: 'read', curve: 0 },
  { from: 'ls_tactics_metrics', to: 'system', label: 'tactics-metrics-state-update event', type: 'event', curve: 40 },

  // Plan → chips storage (self)
  { from: 'plan',          to: 'ls_tactics_chips',   label: 'saveTacticsChipsState', type: 'write', curve: -20 },
  { from: 'ls_tactics_chips', to: 'plan',            label: 'loadTacticsChipsState', type: 'read',  curve: 20 },

  // Plan → settings (self)
  { from: 'plan',          to: 'ls_tactics_settings', label: 'saveTacticsSettings', type: 'write', curve: -20 },
  { from: 'ls_tactics_settings', to: 'plan',          label: 'loadTacticsSettings', type: 'read',  curve: 20 },

  // Plan → column widths (self)
  { from: 'plan',          to: 'ls_tactics_colwidths', label: 'storage.setJSON (direct, not via lib)', type: 'write', curve: 0 },
  { from: 'ls_tactics_colwidths', to: 'plan',           label: 'storage.getJSON', type: 'read',  curve: 30 },

  // System ↔ planner storage
  { from: 'system',        to: 'ls_planner',   label: 'usePlannerStorage → saveTaskRows etc (500ms debounce)', type: 'write', curve: -30 },
  { from: 'ls_planner',    to: 'system',       label: 'usePlannerStorage → readTaskRows etc (on mount)', type: 'read',  curve: 30 },

  // Account deletion
  { from: 'system',        to: 'db_deletion',  label: 'requestAccountDeletion RPC (from AccountSettings)', type: 'write', curve: 20 },
];

const EDGES_GAPS = [
  { from: 'goal',   to: 'system',  label: 'MISSING: Task rows don\'t update when project name/nickname changes on Goal page. Old keys become orphaned.', type: 'gap', curve: -60 },
  { from: 'plan',   to: 'system',  label: 'MISSING: Plan page chip time allocations (blocks) are not exposed. System page can\'t see how hours were actually scheduled per day.', type: 'gap', curve: 80 },
  { from: 'goal',   to: 'plan',    label: 'MISSING: Subproject data in planTableEntries is available but Plan page only reads addedToPlan flag + project colour/nickname. Subproject-level time breakdown from Goal is not used.', type: 'gap', curve: -60 },
  { from: 'system', to: 'plan',    label: 'MISSING: System page task completion (Done/hours) doesn\'t feed back to Plan page. No progress tracking vs. allocated time.', type: 'gap', curve: 80 },
  { from: 'system', to: 'goal',    label: 'MISSING: System page task completion doesn\'t update Outcomes/Actions in Goal plan tables. No feedback loop.', type: 'gap', curve: 60 },
  { from: 'ls_staging', to: 'ls_planner', label: 'MISSING: Year archive clears staging for new year but doesn\'t copy any goal/subproject structure into planner rows for new year.', type: 'gap', curve: 0 },
  { from: 'ls_tactics_chips', to: 'ls_tactics_metrics', label: 'MISSING: Actual chip block durations (hours per project per day) are in chips state but never aggregated into metrics. Plan page knows the schedule but doesn\'t export it.', type: 'gap', curve: -40 },
  { from: 'db_profiles',  to: 'ls_planner', label: 'MISSING: All planning data is in localStorage only. No Supabase backup. Clearing browser storage destroys all plans.', type: 'gap', curve: 0 },
  { from: 'user_ctx',    to: 'system',      label: 'MISSING: User preferences (theme, default_view) are loaded but never persisted and have no effect on any UI.', type: 'gap', curve: 40 },
];

// ═══════════════════════════════════════════════════════════════
// COLOURS & STYLE
// ═══════════════════════════════════════════════════════════════

const TYPE_STYLE = {
  page:     { fill: '#0d2147', stroke: '#1f6feb', textColor: '#58a6ff' },
  context:  { fill: '#1a0a20', stroke: '#da3633', textColor: '#ff7b72' },
  auth:     { fill: '#1a1400', stroke: '#b08800', textColor: '#e3b341' },
  supabase: { fill: '#0a1f14', stroke: '#2ea043', textColor: '#56d364' },
  storage:  { fill: '#0d1f10', stroke: '#2ea043', textColor: '#3fb950' },
};

const EDGE_STYLE = {
  read:  { stroke: '#58a6ff', dash: 'none',      width: 1.5 },
  write: { stroke: '#2ea043', dash: 'none',      width: 1.5 },
  event: { stroke: '#f78166', dash: '5,3',       width: 1.5 },
  gap:   { stroke: '#da3633', dash: '6,4',       width: 2 },
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

let currentView = 'exists';
let selectedNodeId = null;
let viewBox = { x: -100, y: -200, w: 1400, h: 1200 };
let isPanning = false;
let panStart = { x: 0, y: 0, vbx: 0, vby: 0 };

// ═══════════════════════════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════════════════════════

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function getNode(id) { return NODES.find(n => n.id === id); }

function edgePath(x1, y1, x2, y2, curve) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = -dy / len, ny = dx / len;
  const cx = mx + nx * curve;
  const cy = my + ny * curve;
  return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
}

function nodeCenter(node) {
  return { x: node.x + 110, y: node.y + 35 };
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

const svg = document.getElementById('svg');

function render() {
  svg.innerHTML = '';

  const edges = currentView === 'exists' ? EDGES_EXISTS : EDGES_GAPS;

  // Determine which node IDs are connected to the selected node
  let connectedIds = new Set();
  if (selectedNodeId) {
    connectedIds.add(selectedNodeId);
    for (const e of edges) {
      if (e.from === selectedNodeId || e.to === selectedNodeId) {
        connectedIds.add(e.from);
        connectedIds.add(e.to);
      }
    }
  }

  const defs = el('defs');
  // Arrow markers
  for (const [type, style] of Object.entries(EDGE_STYLE)) {
    const marker = el('marker', { id: `arrow-${type}`, markerWidth:'8', markerHeight:'6',
      refX:'7', refY:'3', orient:'auto', markerUnits:'strokeWidth' });
    const path = el('path', { d:'M0,0 L0,6 L8,3 z', fill: style.stroke, opacity: (currentView === 'gaps' && type !== 'gap') ? '0.25' : '1' });
    marker.appendChild(path);
    defs.appendChild(marker);
  }

  // Faded markers for non-selected
  for (const [type, style] of Object.entries(EDGE_STYLE)) {
    const marker = el('marker', { id: `arrow-${type}-dim`, markerWidth:'8', markerHeight:'6',
      refX:'7', refY:'3', orient:'auto', markerUnits:'strokeWidth' });
    const path = el('path', { d:'M0,0 L0,6 L8,3 z', fill: style.stroke, opacity: '0.08' });
    marker.appendChild(path);
    defs.appendChild(marker);
  }

  svg.appendChild(defs);

  // Group layer for pan/zoom
  const g = el('g', { id:'world' });
  svg.appendChild(g);

  // ── Edges ──
  const edgeGroup = el('g');
  g.appendChild(edgeGroup);

  for (const edge of edges) {
    const fromNode = getNode(edge.from);
    const toNode = getNode(edge.to);
    if (!fromNode || !toNode) continue;

    const style = EDGE_STYLE[edge.type] || EDGE_STYLE.read;
    const fc = nodeCenter(fromNode);
    const tc = nodeCenter(toNode);
    const curve = edge.curve || 0;

    let dim = false;
    if (selectedNodeId) {
      dim = !(connectedIds.has(edge.from) && connectedIds.has(edge.to));
    } else if (currentView === 'gaps') {
      dim = false;
    }

    const pathD = edgePath(fc.x, fc.y, tc.x, tc.y, curve);
    const markerEnd = dim ? `url(#arrow-${edge.type}-dim)` : `url(#arrow-${edge.type})`;

    const pathEl = el('path', {
      d: pathD,
      stroke: style.stroke,
      'stroke-width': style.width,
      'stroke-dasharray': style.dash === 'none' ? '' : style.dash,
      fill: 'none',
      opacity: dim ? '0.06' : '0.85',
      'marker-end': markerEnd,
    });
    edgeGroup.appendChild(pathEl);

    // Edge label (only if not dimmed, and only when zoomed or selected)
    if (!dim) {
      const mx = (fc.x + tc.x) / 2;
      const my = (fc.y + tc.y) / 2;
      const dx = tc.x - fc.x, dy = tc.y - fc.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const lx = mx + nx * (curve * 0.5);
      const ly = my + ny * (curve * 0.5);

      const labelLines = edge.label.split('\n');
      const labelG = el('g', { class: 'edge-label', transform: `translate(${lx}, ${ly})` });
      labelLines.forEach((line, i) => {
        const t = el('text', {
          x: '0', y: `${i * 12 - (labelLines.length - 1) * 6}`,
          fill: style.stroke,
          'font-size': '9',
          'text-anchor': 'middle',
          opacity: '0.75',
          'pointer-events': 'none',
        }, line);
        labelG.appendChild(t);
      });
      edgeGroup.appendChild(labelG);
    }
  }

  // ── Nodes ──
  const nodeGroup = el('g');
  g.appendChild(nodeGroup);

  for (const node of NODES) {
    const style = TYPE_STYLE[node.type] || TYPE_STYLE.storage;
    const w = 220, h = 70;
    const dim = selectedNodeId && !connectedIds.has(node.id);
    const selected = node.id === selectedNodeId;

    const ng = el('g', {
      class: 'node',
      transform: `translate(${node.x}, ${node.y})`,
      style: 'cursor:pointer',
    });
    ng.dataset.id = node.id;

    // Shadow/glow for selected
    if (selected) {
      const glow = el('rect', {
        x: '-4', y: '-4', width: w+8, height: h+8,
        rx: '10', ry: '10',
        fill: 'none',
        stroke: style.stroke,
        'stroke-width': '3',
        opacity: '0.5',
        filter: 'blur(4px)',
      });
      ng.appendChild(glow);
    }

    // Background rect
    const rect = el('rect', {
      x: '0', y: '0', width: w, height: h,
      rx: '8', ry: '8',
      fill: style.fill,
      stroke: style.stroke,
      'stroke-width': selected ? '2' : '1',
      opacity: dim ? '0.2' : '1',
    });
    ng.appendChild(rect);

    // Type badge
    const badgeW = 56;
    const badge = el('rect', {
      x: w - badgeW - 8, y: '8',
      width: badgeW, height: 16,
      rx: '4', ry: '4',
      fill: style.stroke,
      opacity: dim ? '0.1' : '0.2',
    });
    ng.appendChild(badge);
    const badgeText = el('text', {
      x: w - badgeW/2 - 8, y: '20',
      fill: style.textColor,
      'font-size': '8',
      'text-anchor': 'middle',
      'font-weight': '600',
      opacity: dim ? '0.2' : '0.9',
    }, node.type.toUpperCase());
    ng.appendChild(badgeText);

    // Main label
    const label = el('text', {
      x: '12', y: '26',
      fill: dim ? '#484f58' : style.textColor,
      'font-size': '13',
      'font-weight': '700',
    }, node.label);
    ng.appendChild(label);

    // Sub label
    if (node.sub) {
      const sub = el('text', {
        x: '12', y: '44',
        fill: dim ? '#30363d' : '#484f58',
        'font-size': '10',
        'font-family': 'monospace',
      }, node.sub);
      ng.appendChild(sub);
    }

    // Click + hover handlers
    ng.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedNodeId = (selectedNodeId === node.id) ? null : node.id;
      render();
    });

    ng.addEventListener('mouseenter', (e) => {
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<strong>${node.label}</strong>${node.desc}`;
      tt.classList.add('visible');
    });
    ng.addEventListener('mousemove', (e) => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.clientX + 16) + 'px';
      tt.style.top  = (e.clientY - 10) + 'px';
    });
    ng.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').classList.remove('visible');
    });

    nodeGroup.appendChild(ng);
  }

  applyViewBox();
}

// ═══════════════════════════════════════════════════════════════
// PAN / ZOOM
// ═══════════════════════════════════════════════════════════════

function applyViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}

svg.addEventListener('click', () => {
  if (selectedNodeId) { selectedNodeId = null; render(); }
});

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const rect = svg.getBoundingClientRect();
  const mx = viewBox.x + (e.clientX - rect.left) / rect.width * viewBox.w;
  const my = viewBox.y + (e.clientY - rect.top)  / rect.height * viewBox.h;
  viewBox.w *= factor;
  viewBox.h *= factor;
  viewBox.x = mx - (e.clientX - rect.left) / rect.width * viewBox.w;
  viewBox.y = my - (e.clientY - rect.top)  / rect.height * viewBox.h;
  applyViewBox();
}, { passive: false });

svg.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  isPanning = true;
  svg.classList.add('panning');
  panStart = { x: e.clientX, y: e.clientY, vbx: viewBox.x, vby: viewBox.y };
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const scaleX = viewBox.w / rect.width;
  const scaleY = viewBox.h / rect.height;
  viewBox.x = panStart.vbx - (e.clientX - panStart.x) * scaleX;
  viewBox.y = panStart.vby - (e.clientY - panStart.y) * scaleY;
  applyViewBox();
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  svg.classList.remove('panning');
});

// ═══════════════════════════════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════════════════════════════

function setView(v) {
  currentView = v;
  selectedNodeId = null;
  document.getElementById('btn-exists').classList.toggle('active', v === 'exists');
  document.getElementById('btn-gaps').classList.toggle('active', v === 'gaps');
  render();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

render();
</script>
