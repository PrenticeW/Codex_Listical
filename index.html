<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#d5a6bd" />

    <title>Tacular</title>
    <meta
      name="description"
      content="Tacular is a 12 week cycle planning tool for creative practitioners. Set goals, schedule weekly time, and track daily progress across an 84 day timeline."
    />

    <!-- Open Graph. og:image and twitter:image intentionally omitted until the
         brand asset is designed; add /og-card.png here when it lands. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tacular" />
    <meta
      property="og:description"
      content="12 week cycle planning for creative practitioners."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tacular" />
    <meta
      name="twitter:description"
      content="12 week cycle planning for creative practitioners."
    />

    <!-- Search indexing is gated at /robots.txt; page level default is noindex
         until the marketing surface is designed. -->
    <meta name="robots" content="noindex, nofollow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
